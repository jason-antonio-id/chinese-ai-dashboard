<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Choice — AI Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #020f1f 0%, #042C53 50%, #0C447C 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(133,183,235,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .choice-card {
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 500px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.3),
                0 0 60px rgba(55,138,221,0.2);
            position: relative;
            z-index: 10;
            animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .welcome-icon {
            text-align: center;
            font-size: 56px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: #042C53;
            text-align: center;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #6B7280;
            text-align: center;
            margin-bottom: 32px;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .choice-btn {
            background: white;
            border: 2px solid #E8F0FE;
            border-radius: 16px;
            padding: 28px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .choice-btn:hover {
            border-color: #378ADD;
            background: #F0F5FB;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(55,138,221,0.2);
        }

        .choice-btn.admin {
            background: linear-gradient(135deg, #042C53, #185FA5);
            border-color: transparent;
        }

        .choice-btn.admin:hover {
            background: linear-gradient(135deg, #185FA5, #378ADD);
            box-shadow: 0 12px 30px rgba(4,44,83,0.3);
        }

        .choice-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .choice-btn.admin .choice-icon {
            filter: grayscale(1) brightness(2);
        }

        .choice-title {
            font-size: 16px;
            font-weight: 600;
            color: #042C53;
            margin-bottom: 4px;
        }

        .choice-btn.admin .choice-title {
            color: white;
        }

        .choice-desc {
            font-size: 12px;
            color: #6B7280;
        }

        .choice-btn.admin .choice-desc {
            color: rgba(255,255,255,0.8);
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #378ADD;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .back-link a:hover {
            color: #042C53;
        }

        @media (max-width: 480px) {
            .choice-card { padding: 32px 24px; }
            .choice-grid { grid-template-columns: 1fr; }
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="particles" id="particles"></div>

<div class="choice-card">
    <div class="welcome-icon">👋</div>
    <div class="welcome-title">Welcome back, {{ username }}!</div>
    <div class="welcome-subtitle">How would you like to log in today?</div>

    <div class="choice-grid">
        <form method="POST" action="/login-as">
            <input type="hidden" name="type" value="user">
            <input type="hidden" name="username" value="{{ username }}">
            <button type="submit" class="choice-btn" style="width:100%;">
                <div class="choice-icon">🤖</div>
                <div class="choice-title">User Mode</div>
                <div class="choice-desc">Access AI tools dashboard</div>
            </button>
        </form>

        <form method="POST" action="/login-as">
            <input type="hidden" name="type" value="admin">
            <input type="hidden" name="username" value="{{ username }}">
            <button type="submit" class="choice-btn admin" style="width:100%;">
                <div class="choice-icon">👑</div>
                <div class="choice-title">Admin Mode</div>
                <div class="choice-desc">Access admin dashboard</div>
            </button>
        </form>
    </div>

    <div class="back-link">
        <a href="/login">← Back to Login</a>
    </div>
</div>

<script>
const particles = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
    particle.style.animationDelay = (Math.random() * 10) + 's';
    particles.appendChild(particle);
}
</script>

</body>
</html>
