<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Review Detector — AI Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:white; }
        .navbar { background:#042C53; padding:0.875rem 2rem; display:flex; align-items:center; justify-content:space-between; }
        .navbar-logo { color:white; font-size:15px; font-weight:600; }
        .navbar-logo span { color:#85B7EB; font-size:11px; display:block; }
        .nav-link { color:#85B7EB; font-size:12px; padding:5px 14px; border-radius:20px; border:0.5px solid #185FA5; text-decoration:none; }
        .nav-link:hover { background:#185FA5; color:white; }
        .tool-page { max-width:750px; margin:2rem auto; padding:0 1rem; }
        .tool-title { font-size:20px; font-weight:600; color:#042C53; margin-bottom:4px; }
        .tool-cn { font-size:13px; color:#378ADD; margin-bottom:1.5rem; }
        .tool-card { background:#F0F5FB; border-radius:12px; padding:1.5rem; border-left:3px solid #378ADD; margin-bottom:1rem; }
        label { font-size:12px; color:#378ADD; display:block; margin-bottom:4px; margin-top:10px; }
        textarea { width:100%; padding:10px 14px; border:0.5px solid #B5D4F4; border-radius:8px; font-size:14px; margin-bottom:10px; background:white; color:#042C53; outline:none; box-sizing:border-box; }
        input[type="file"] { width:100%; padding:10px; border:0.5px dashed #378ADD; border-radius:8px; font-size:13px; margin-bottom:10px; background:white; color:#042C53; box-sizing:border-box; }
        button[type="submit"] { background:#042C53; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; width:100%; }
        button[type="submit"]:hover { background:#185FA5; }
        .result { margin-top:1rem; padding:1rem; background:white; border-radius:8px; border-left:3px solid #378ADD; font-size:13px; color:#042C53; white-space:pre-wrap; }
        .back-link { display:inline-block; margin-bottom:1rem; color:#378ADD; font-size:13px; text-decoration:none; }
        .divider { text-align:center; color:#85B7EB; font-size:12px; margin:10px 0; }
        .chart-box { background:white; border-radius:12px; padding:1rem; margin-top:1rem; border:0.5px solid #B5D4F4; }
        .csv-hint { font-size:11px; color:#85B7EB; margin-bottom:8px; }
    </style>
</head>
<body>
<div class="navbar">
    <div class="navbar-logo">AI Dashboard <span>人工智能工具平台</span></div>
    <div style="display:flex;gap:8px;">
        <a href="/" class="nav-link">总览 Home</a>
        <a href="/logout" class="nav-link">登出 Logout</a>
    </div>
</div>
<div class="tool-page">
    <a href="/" class="back-link">← 返回 Back</a>
    <div class="tool-title">🚨 Fake Review Detector</div>
    <div class="tool-cn">虚假评论检测 — Detect fake Chinese reviews</div>
    <div class="tool-card">
        <form method="POST" action="/fakereview" enctype="multipart/form-data">
            <label>输入评论 Type a review</label>
            <textarea name="review" rows="3" placeholder="输入中文评论..."></textarea>
            <div class="divider">— OR upload CSV 或上传CSV —</div>
            <div class="csv-hint">CSV: one review per row, first column = review text</div>
            <input type="file" name="file" accept=".csv">
            <button type="submit">检测 Detect</button>
        </form>
        {% if result %}
        <div class="result">{{ result }}</div>
        {% endif %}
        {% if chart_data %}
        <div class="chart-box">
            <canvas id="fakeChart" height="200"></canvas>
        </div>
        {% endif %}
    </div>
</div>
{% if chart_data %}
<script>
const data = {{ chart_data|safe }};
new Chart(document.getElementById('fakeChart'), {
    type: 'doughnut',
    data: {
        labels: ['Fake 虚假', 'Genuine 真实'],
        datasets: [{
            data: [data.fake, data.genuine],
            backgroundColor: ['#E24B4A', '#1D9E75'],
            borderWidth: 0
        }]
    },
    options: {
        plugins: { legend: { position: 'bottom' } },
        cutout: '60%'
    }
});
</script>
{% endif %}
</body>
</html>
