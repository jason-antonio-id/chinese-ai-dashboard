<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — AI Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #042C53 0%, #0C447C 50%, #378ADD 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ocean waves background */
        .ocean {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 200px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 88.7"><path d="M800 56.9c-155.5 0-204.9-50-405.5-49.9-200 0-250 49.9-394.5 49.9v31.8h800v-.2-31.6z" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 50% 100%;
            animation: wave-move 20s linear infinite;
            opacity: 0.3;
        }

        .wave:nth-child(2) {
            bottom: 10px;
            opacity: 0.2;
            animation: wave-move 15s linear infinite reverse;
            height: 180px;
        }

        .wave:nth-child(3) {
            bottom: 20px;
            opacity: 0.15;
            animation: wave-move 25s linear infinite;
            height: 160px;
        }

        @keyframes wave-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Floating bubbles */
        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(133, 183, 235, 0.3);
            border-radius: 50%;
            animation: float 12s infinite ease-in;
            box-shadow: 0 0 10px rgba(133, 183, 235, 0.5);
        }

        .bubble:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-duration: 10s; animation-delay: 0s; }
        .bubble:nth-child(2) { left: 20%; width: 20px; height: 20px; animation-duration: 12s; animation-delay: 1s; }
        .bubble:nth-child(3) { left: 35%; width: 50px; height: 50px; animation-duration: 14s; animation-delay: 2s; }
        .bubble:nth-child(4) { left: 50%; width: 30px; height: 30px; animation-duration: 11s; animation-delay: 0s; }
        .bubble:nth-child(5) { left: 65%; width: 25px; height: 25px; animation-duration: 13s; animation-delay: 3s; }
        .bubble:nth-child(6) { left: 80%; width: 45px; height: 45px; animation-duration: 15s; animation-delay: 1s; }
        .bubble:nth-child(7) { left: 90%; width: 35px; height: 35px; animation-duration: 12s; animation-delay: 2s; }
        .bubble:nth-child(8) { left: 15%; width: 28px; height: 28px; animation-duration: 10s; animation-delay: 4s; }
        .bubble:nth-child(9) { left: 45%; width: 22px; height: 22px; animation-duration: 14s; animation-delay: 3s; }
        .bubble:nth-child(10) { left: 75%; width: 38px; height: 38px; animation-duration: 11s; animation-delay: 5s; }

        @keyframes float {
            0% {
                bottom: -100px;
                transform: translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                bottom: 100vh;
                transform: translateX(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Glassmorphism container */
        .signup-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25), 
                        0 0 0 1px rgba(255,255,255,0.2) inset;
            width: 90%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .logo h1 {
            color: #042C53;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #378ADD;
            font-size: 12px;
            display: block;
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.3rem;
            animation: slideInRight 0.5s ease-out forwards;
            opacity: 0;
            transform: translateX(-20px);
        }

        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }
        .form-group:nth-child(3) { animation-delay: 0.5s; }
        .form-group:nth-child(4) { animation-delay: 0.6s; }

        @keyframes slideInRight {
            to { 
                opacity: 1; 
                transform: translateX(0);
            }
        }

        label {
            display: block;
            color: #042C53;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            transition: transform 0.3s ease;
        }

        .input-wrapper:focus-within {
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #85B7EB;
            transition: all 0.3s ease;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #E8F0FE;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #FAFBFC;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #378ADD;
            background: white;
            box-shadow: 0 0 0 4px rgba(55,138,221,0.1), 0 4px 12px rgba(55,138,221,0.15);
        }

        input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: #378ADD;
            transform: translateY(-50%) scale(1.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #378ADD 0%, #042C53 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
            animation: slideInRight 0.5s ease-out 0.7s forwards;
            opacity: 0;
            transform: translateX(-20px);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(55,138,221,0.4);
        }

        button:active {
            transform: translateY(-1px) scale(0.98);
        }

        .error {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            color: #DC2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 1rem;
            border-left: 4px solid #DC2626;
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 13px;
            color: #6B7280;
            animation: fadeIn 0.5s ease-out 0.8s forwards;
            opacity: 0;
        }

        .login-link a {
            color: #378ADD;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #378ADD;
            transition: width 0.3s ease;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .login-link a:hover {
            color: #042C53;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .signup-container {
                padding: 2rem;
                margin: 1rem;
            }
            .logo h1 { font-size: 22px; }
        }
    </style>
<base target="_blank">
<base target="_blank">
</head>
<body>
    <!-- Ocean waves -->
    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- Floating bubbles -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="signup-container">
        <div class="logo">
            <h1>AI Dashboard</h1>
            <span>人工智能工具平台</span>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label>Full Name 姓名</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Username 用户名</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email 邮箱</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password 密码</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <button type="submit">Create Account 创建账户</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login 登录</a>
        </div>
    </div>
</body>
</html>
