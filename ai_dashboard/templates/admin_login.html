<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — AI Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #020f1f 0%, #042C53 50%, #0C447C 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(133,183,235,0.4);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Login card */
        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.3),
                0 0 0 1px rgba(133,183,235,0.3),
                0 0 60px rgba(55,138,221,0.2);
            position: relative;
            z-index: 10;
            animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #042C53, #185FA5);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #042C53;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 32px;
        }

        .error {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            color: #DC2626;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 4px solid #DC2626;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #042C53;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E8F0FE;
            border-radius: 12px;
            font-size: 15px;
            background: #FAFBFC;
            color: #042C53;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #378ADD;
            background: white;
            box-shadow: 0 0 0 4px rgba(55,138,221,0.15);
        }

        input::placeholder { color: #85B7EB; }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #042C53 0%, #185FA5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(4,44,83,0.3);
            margin-top: 8px;
        }

        button:hover {
            background: linear-gradient(135deg, #185FA5 0%, #378ADD 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(55,138,221,0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #378ADD;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #042C53;
        }

        .secure-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="particles" id="particles"></div>

<div class="login-card">
    <div class="secure-icon">🔐</div>
    <div class="admin-badge">⚡ Admin Access</div>
    
    <div class="login-title">Admin Panel</div>
    <div class="login-subtitle">Authorized personnel only</div>

    {% if error %}
    <div class="error">
        <span>⚠️</span>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/admin/login">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter admin username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter admin password" required>
        </div>

        <button type="submit">Access Admin Panel</button>
    </form>

    <div class="back-link">
        <a href="/">← Back to Dashboard</a>
    </div>
</div>

<script>
const particles = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
    particle.style.animationDelay = (Math.random() * 10) + 's';
    particles.appendChild(particle);
}
</script>

</body>
</html>
