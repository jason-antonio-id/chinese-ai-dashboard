<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Scanner — AI Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div class="navbar-logo">
        AI Dashboard
        <span>人工智能工具平台</span>
    </div>
    <div class="navbar-links">
        <a href="/" class="nav-link">总览 Home</a>
        <a href="/logout" class="nav-link">登出 Logout</a>
    </div>
</div>

<div class="tool-page">
    <a href="/" class="back-link">← 返回 Back</a>
    <div class="tool-title">📄 OCR Scanner</div>
    <div class="tool-cn">文字识别 — Extract text from images</div>

    <div class="tool-card">
        <form method="POST" action="/ocr" enctype="multipart/form-data">
            <label style="font-size:12px; color:#378ADD;">上传图片 Upload image</label>
            <input type="file" name="image" accept="image/*">
            <button type="submit">识别 Recognize</button>
        </form>

        {% if result %}
        <div class="result">{{ result }}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
