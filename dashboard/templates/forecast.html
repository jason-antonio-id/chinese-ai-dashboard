{% extends "base.html" %}

{% block title %}Sales Forecast - AI Dashboard{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="text-center mb-12">
    <h1 class="text-4xl lg:text-5xl font-black bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent mb-4">
      <i class="fas fa-chart-line"></i> Sales Forecast
    </h1>
    <p class="text-xl text-blue-100">Next 3 months predictions</p>
  </div>

  <div class="card-3d p-8">
    <table class="table-3d w-full">
      <thead>
        <tr>
          <th>Month</th>
          <th>Predicted Items</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>June 2023</td>
          <td class="font-bold text-green-600">155</td>
        </tr>
        <tr>
          <td>July 2023</td>
          <td class="font-bold text-green-600">165</td>
        </tr>
        <tr>
          <td>August 2023</td>
          <td class="font-bold text-green-600">172</td>
        </tr>
      </tbody>
    </table>
    <p class="text-center mt-8 text-blue-200">Trend: ↑ Growing 10% monthly</p>
  </div>
</div>
{% endblock %}
