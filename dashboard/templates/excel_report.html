{% extends "base.html" %}

{% block title %}Excel Report Generator - AI Dashboard{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="text-center mb-12">
    <h1 class="text-4xl lg:text-5xl font-black bg-gradient-to-r from-green-400 to-lime-400 bg-clip-text text-transparent mb-4">
      <i class="fas fa-file-excel"></i> Excel Report Generator
    </h1>
    <p class="text-xl text-blue-100">Professional business reports from CSV</p>
  </div>

  <div class="card-3d p-8">
    <form method="post" enctype="multipart/form-data" class="space-y-6">
      <div>
        <label class="block text-lg font-semibold mb-4 text-white">Upload Orders CSV:</label>
        <input type="file" name="csv_file" accept=".csv" required 
               class="w-full p-6 bg-white/20 border border-white/30 rounded-2xl focus:ring-4 ring-green-500/20">
      </div>
      <button type="submit" class="btn-3d w-full text-xl py-6">
        <i class="fas fa-file-export mr-3"></i> Generate Report
      </button>
    </form>
  </div>

  {% if summary %}
    <div class="card-3d mt-12">
      <h3 class="text-2xl font-bold mb-6 text-white">Report Preview</h3>
      {{ summary_table|safe }}
      <div class="text-center mt-8">
        <a href="/excel-download" class="btn-3d text-xl px-8 py-4">
          <i class="fas fa-download mr-2"></i> Download business_report.xlsx
        </a>
      </div>
    </div>
  {% endif %}
</div>
{% endblock %}
